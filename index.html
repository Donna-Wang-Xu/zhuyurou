<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>柔柔宝，天天开心～～～</title>
    <meta
      name="description"
      content="柔柔宝，天天开心～～～ | zhuyurou.net"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #fff5f7;
        --bg-2: #ffe4ec;
        --text: #4a1f2e;
        --accent: #e84a7c;
        --accent-2: #ff8fab;
        --glow: rgba(255, 143, 171, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: "ZCOOL KuaiLe", "Noto Sans SC", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        background: linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 55%, #ffd6e3 100%);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      .aurora {
        position: fixed;
        inset: -20%;
        z-index: 0;
        background: radial-gradient(
            circle at 20% 30%,
            rgba(255, 200, 220, 0.55) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(255, 180, 200, 0.4) 0%,
            transparent 45%
          );
        animation: drift 18s ease-in-out infinite alternate;
        pointer-events: none;
      }

      @keyframes drift {
        from {
          transform: translate(0, 0) scale(1);
        }
        to {
          transform: translate(2%, -1%) scale(1.05);
        }
      }

      .stage {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 1.5rem 1.25rem 2rem;
        max-width: 92vw;
      }

      .title {
        margin: 0 0 0.75rem;
        font-size: clamp(1.9rem, 6.5vw, 2.75rem);
        font-weight: 800;
        letter-spacing: 0.06em;
        line-height: 1.35;
        background: linear-gradient(
          100deg,
          #c23a5c 0%,
          #e84a7c 35%,
          #ff6b9d 70%,
          #ffb3c9 100%
        );
        background-size: 200% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shimmer 5s ease-in-out infinite, floatY 3.2s ease-in-out
          infinite;
        filter: drop-shadow(0 0 22px var(--glow));
      }

      @keyframes shimmer {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      @keyframes floatY {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      .tilde {
        display: inline-block;
        animation: wiggle 0.7s ease-in-out infinite;
        transform-origin: 50% 100%;
      }

      @keyframes wiggle {
        0%,
        100% {
          transform: rotate(-4deg) scale(1.02);
        }
        50% {
          transform: rotate(5deg) scale(1.05);
        }
      }

      .hearts {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .heart {
        position: absolute;
        bottom: -10%;
        width: 14px;
        height: 14px;
        opacity: 0;
        animation: rise linear infinite;
      }

      .heart::before,
      .heart::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: var(--accent-2);
        border-radius: 50% 50% 0 0;
        transform: rotate(-45deg);
        transform-origin: 50% 100%;
        box-shadow: 0 0 12px rgba(255, 120, 160, 0.35);
      }

      .heart::after {
        left: 50%;
        transform: translateX(-50%) rotate(45deg);
        transform-origin: 50% 100%;
      }

      @keyframes rise {
        0% {
          transform: translate3d(0, 0, 0) scale(0.6);
          opacity: 0;
        }
        8% {
          opacity: 0.85;
        }
        100% {
          transform: translate3d(var(--dx, 0), -120vh, 0) scale(1.1);
          opacity: 0;
        }
      }

      .spark {
        position: fixed;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.8);
        z-index: 0;
        pointer-events: none;
        animation: twinkle 2.5s ease-in-out infinite;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.15;
          transform: scale(0.5);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }

      .footer {
        position: fixed;
        bottom: 1rem;
        left: 0;
        right: 0;
        z-index: 2;
        text-align: center;
        font-size: 0.75rem;
        font-family: "Noto Sans SC", system-ui, sans-serif;
        color: rgba(74, 31, 46, 0.45);
        letter-spacing: 0.12em;
      }
    </style>
  </head>
  <body>
    <div class="aurora" aria-hidden="true"></div>
    <div class="hearts" id="hearts" aria-hidden="true"></div>
    <div class="stage">
      <h1 class="title" id="mainTitle">
        柔柔宝，天天开心 <span class="tilde" aria-hidden="true">～～～</span>
      </h1>
    </div>
    <p class="footer">zhuyurou.net</p>

    <script>
      (function () {
        const container = document.getElementById("hearts");
        if (!container) return;

        function spawnHeart() {
          const h = document.createElement("div");
          h.className = "heart";
          h.style.left = Math.random() * 100 + "vw";
          h.style.setProperty("--dx", (Math.random() * 60 - 30) + "px");
          const d = 10 + Math.random() * 12;
          h.style.animationDuration = d + "s";
          h.style.animationDelay = Math.random() * 2 + "s";
          container.appendChild(h);
          setTimeout(function () {
            h.remove();
          }, (d + 3) * 1000);
        }

        for (let i = 0; i < 8; i++) spawnHeart();
        setInterval(spawnHeart, 1200);

        for (let i = 0; i < 16; i++) {
          const s = document.createElement("div");
          s.className = "spark";
          s.style.left = Math.random() * 100 + "vw";
          s.style.top = Math.random() * 100 + "vh";
          s.style.animationDelay = Math.random() * 2.5 + "s";
          document.body.appendChild(s);
        }
      })();
    </script>
  </body>
</html>
